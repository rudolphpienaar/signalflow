# Wire-model case: ROOT PARENT — MULTIPLE CHILDREN (N=3)
#
# Root chip: left wall never pierced. All right-wall connections are single-wall
# ├►/├◄. Consecutive child pairs are separated by a wire-pair-space row;
# call and return of the same child are adjacent (no blank within).
# chip_h = 3*3 + 3 = 12

title: "root parent — three children"
tree:
  module: Pipeline.ts
  func: "pipeline()"
  output_ports:
    - signal: "rawData"
      return: "parsed"
    - signal: "parsed"
      return: "validated"
    - signal: "validText"
      return: "summary"
  calls:
    - module: Pipeline.ts
      func: "parse()"
      input_ports:
        - signal: "rawData"
          return: "parsed"
      calls: []
    - module: Pipeline.ts
      func: "validate()"
      input_ports:
        - signal: "parsed"
          return: "validated"
      calls: []
    - module: Pipeline.ts
      func: "report()"
      input_ports:
        - signal: "validated"
      calls: []
