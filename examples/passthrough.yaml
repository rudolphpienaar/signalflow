# Wire-model case: NON-ROOT PARENT — PASS-THROUGH (N=1)
#
# A transit node that receives a call from the left, immediately dispatches
# its single child call to the right (both walls active → ┼ on both rows),
# and returns the (possibly transformed) child result to its caller.
# chip_h = 3*1 + 3 = 6

title: "non-root parent — pass-through single child"
tree:
  module: App.ts
  func: "main()"
  output_ports:
    - signal: "model"
      return: "model"
  calls:
    - module: Adapter.ts
      func: "transform()"
      input_ports:
        - signal: "input"
          return: "output"
      output_ports:
        - signal: "payload"
          return: "result"
      calls:
        - module: Codec.ts
          func: "encode()"
          input_ports:
            - signal: "input"
              return: "payload"
          calls: []
