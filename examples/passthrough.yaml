# Wire-model case: Internal Wiring Manifold
#
# demonstrates arbitrary routing inside a chip.
# codec:   passthrough via internal_wiring
# encrypt: encapsulated (no internal_wiring)
# adapter: internal thread linking return to signal

title: "Internal Wiring Manifold"
tree:
  module: App.ts
  func: "main()"
  output_ports:
    - signal: "raw"
      return: "final"
  calls:
    - module: Adapter.ts
      func: "adapter()"
      input_ports:
        - signal: "raw"
          return: "final"
      output_ports:
        - signal: "data"
          return: "ready"
        - signal: "blob"
          return: "secure"
      internal_wiring:
        - "raw:data"    # parent-signal -> child-signal
        - "ready:blob"  # child-return -> child-signal (SEQUENTIAL THREAD)
        - "secure:final" # child-return -> parent-return
      calls:
        - module: Codec.ts
          func: "codec()"
          input_ports:
            - signal: "data"
              return: "ready"
          output_ports:
            - signal: "data"
              return: "ready"
          internal_wiring:
            - "data:data"   # straight horizontal pierce
            - "ready:ready" # straight horizontal pierce
          calls:
            - module: Binary.ts
              func: "pack()"
              input_ports:
                - signal: "data"
                  return: "ready"
              calls: []
        - module: Security.ts
          func: "encrypt()"
          input_ports:
            - signal: "blob"
              return: "secure"
          output_ports:
            - signal: "clear"
              return: "cipher"
          # No internal_wiring: signal ends at wall (TRANSFORMATION)
          calls:
            - module: Crypto.ts
              func: "aes_wrap()"
              input_ports:
                - signal: "clear"
                  return: "cipher"
              calls: []
