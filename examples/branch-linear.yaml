# Wire-model case: NON-ROOT PARENT вҖ” BRANCH ON RETURN, LINEAR CHAIN (N=3)
#
# Each child's return value feeds directly into the next child's call.
# The function's own return depends only on the LAST child's result.
#
#   def process(entry):
#       ret_1 = child_1(entry.something)   # entry вҶ’ child 1
#       ret_2 = child_2(ret_1)             # child 1 result вҶ’ child 2
#       ret_3 = child_3(ret_2)             # child 2 result вҶ’ child 3
#       return ret_3.something             # depends only on child 3
#
# Interior arms (в”Ң в”җ в”” в”ҳ в”Ӯ в”Җ) encode the data dependency chain inside the chip.
# Left-side vertical arm connects func return at y+4 down to final child return.
# chip_h = 3*3 + 3 = 12
#
#            в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
